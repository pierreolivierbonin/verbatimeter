  <text x="24" y="128"><tspan class="w g" style="animation-delay:2.56s">entirely. </tspan><tspan class="w m" style="animation-delay:2.68s">It </tspan><tspan class="w m" style="animation-delay:2.80s">is </tspan><tspan class="w m" style="animation-delay:2.92s">faster </tspan><tspan class="w m" style="animation-delay:3.04s">because </tspan><tspan class="w m" style="animation-delay:3.16s">it </tspan><tspan class="w m" style="animation-delay:3.28s">is </tspan><tspan class="w g" style="animation-delay:3.40s">more </tspan><tspan class="w g" style="animation-delay:3.52s">parallelizable </tspan><tspan class="w g" style="animation-delay:3.64s">and </tspan><tspan class="w m" style="animation-delay:3.76s">requires</tspan></text>
